name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Format check
        run: bun run format:check
      - name: Lint
        run: bun run lint
      - name: Codegen
        run: bunx graph codegen
      - name: Build
        run: bun run build
      - name: Test
        run: bun run test
      - name: Test coverage
        run: bun run test:coverage
      - name: Audit
        run: echo "audit skipped"
