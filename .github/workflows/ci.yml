name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build, Format, Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: bun install --frozen-lockfile
      - name: Format check
        run: bun run format:check
      - name: Lint
        run: bun run lint
      - name: Type check
        run: bun run type:check
      - name: Build
        run: bun run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: bun install --frozen-lockfile
      - name: Test
        run: bun run test
