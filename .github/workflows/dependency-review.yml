name: Dependency review

on:
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          # graph-cli's dev-only Axios, lodash, and archive-helper chain has no
          # compatible published fix; production dependencies stay enforced in CI.
          allow-ghsas: >-
            GHSA-jr5f-v2jv-69x6,
            GHSA-r5fr-rjxr-66jc,
            GHSA-pmwg-cvhr-8vh7,
            GHSA-pf86-5x62-jrwf,
            GHSA-6chq-wfr3-2hj9,
            GHSA-43fc-jf86-j433,
            GHSA-hfxv-24rg-xrqf,
            GHSA-p92q-9vqr-4j8v,
            GHSA-j5f8-grm9-p9fc,
            GHSA-3g43-6gmg-66jw,
            GHSA-mp2f-45pm-3cg9,
            GHSA-pjwm-pj3p-43mv
